name: Deploy Django to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH and tmux
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "========================================="
            echo "🚀 Starting Django Deployment"
            echo "========================================="

            PROJECT_DIR="/home/${{ secrets.SERVER_USER }}/PixiiAssigment/backend"
            VENV_PATH="/home/${{ secrets.SERVER_USER }}/PixiiAssigment/backend/venv"
            TMUX_SESSION="asses"
            TMUX_TARGET="${TMUX_SESSION}:0.0"

            echo "🔍 Checking tmux session: ${TMUX_SESSION}"

            if ! tmux has-session -t "${TMUX_SESSION}" 2>/dev/null; then
              echo "Creating tmux session '${TMUX_SESSION}'..."
              tmux new-session -s "${TMUX_SESSION}" -d
              echo "✅ Session created"
            else
              echo "✅ Session already exists"
            fi

            send_line() {
              local cmd="$1"
              local wait_time="${2:-2}"

              echo "➡️  tmux ${TMUX_TARGET}: ${cmd}"
              tmux send-keys -t "${TMUX_TARGET}" -- "${cmd}" C-m
              sleep "${wait_time}"
            }

            echo ""
            echo "========================================="
            echo "📤 Sending commands line-by-line to tmux"
            echo "Target: ${TMUX_TARGET}"
            echo "========================================="
            echo ""

            send_line "clear" 1

            send_line "echo '========================================='" 1
            send_line "echo '🚀 Django Deployment Started'" 1
            send_line "echo '========================================='" 1
            send_line "date" 1

            send_line "echo '📂 Project directory: ${PROJECT_DIR}'" 1
            send_line "echo '🐍 Virtualenv path: ${VENV_PATH}'" 1

            send_line "echo '========================================='" 1
            send_line "echo '🛑 Step 1: Stopping app services'" 1
            send_line "echo '========================================='" 1

            send_line "pkill -f 'python manage.py runserver' || true" 2
            send_line "pkill -f 'gunicorn' || true" 2
            send_line "pkill -f 'celery -A config worker' || true" 2
            send_line "pkill -f 'celery -A config beat' || true" 2

            send_line "echo '✅ App services stopped'" 1

            send_line "echo '========================================='" 1
            send_line "echo '🔴 Step 2: Ensuring Redis is running'" 1
            send_line "echo '========================================='" 1

            send_line "sudo systemctl enable redis-server || true" 2
            send_line "sudo systemctl restart redis-server || sudo systemctl restart redis || true" 3
            send_line "redis-cli ping || true" 2

            send_line "echo '========================================='" 1
            send_line "echo '📂 Step 3: Entering project directory'" 1
            send_line "echo '========================================='" 1

            send_line "cd ${PROJECT_DIR}" 1
            send_line "pwd" 1

            send_line "echo '========================================='" 1
            send_line "echo '🔄 Step 4: Pulling latest code'" 1
            send_line "echo '========================================='" 1

            send_line "git fetch origin main" 4
            send_line "git reset --hard origin/main" 4
            send_line "git status" 2

            send_line "echo '========================================='" 1
            send_line "echo '🐍 Step 5: Activating virtual environment'" 1
            send_line "echo '========================================='" 1

            send_line "source ${VENV_PATH}/bin/activate" 1
            send_line "python --version" 1
            send_line "pip --version" 1

            send_line "echo '========================================='" 1
            send_line "echo '📦 Step 6: Installing dependencies'" 1
            send_line "echo '========================================='" 1

            send_line "pip install -r requirements.txt" 20

            send_line "echo '========================================='" 1
            send_line "echo '🗄️ Step 7: Running migrations'" 1
            send_line "echo '========================================='" 1

            send_line "python manage.py makemigrations" 5
            send_line "python manage.py migrate" 8

            send_line "echo '========================================='" 1
            send_line "echo '📊 Step 8: Collecting static files'" 1
            send_line "echo '========================================='" 1

            send_line "python manage.py collectstatic --noinput" 8

            send_line "echo '========================================='" 1
            send_line "echo '🧪 Step 9: Running Django checks'" 1
            send_line "echo '========================================='" 1

            send_line "python manage.py check" 5

            send_line "echo '========================================='" 1
            send_line "echo '✅ Step 10: Starting services'" 1
            send_line "echo '========================================='" 1

            send_line "echo '🔵 Starting Celery worker...'" 1
            send_line "nohup celery -A config worker --loglevel=info --pool=solo > /tmp/celery.log 2>&1 &" 3

            send_line "echo '🟢 Starting Django server...'" 1
            send_line "nohup python manage.py runserver 0.0.0.0:8000 > /tmp/django.log 2>&1 &" 3

            send_line "echo '========================================='" 1
            send_line "echo '🌐 Step 11: Reloading Nginx'" 1
            send_line "echo '========================================='" 1

            send_line "sudo nginx -t" 3
            send_line "sudo systemctl reload nginx" 2

            send_line "echo '========================================='" 1
            send_line "echo '📍 Step 12: Service status'" 1
            send_line "echo '========================================='" 1

            send_line "ps aux | grep -E 'runserver|celery' | grep -v grep || true" 2
            send_line "sudo systemctl status redis-server --no-pager || sudo systemctl status redis --no-pager || true" 2
            send_line "sudo systemctl status nginx --no-pager || true" 2

            send_line "echo '========================================='" 1
            send_line "echo '✅ Deployment Complete!'" 1
            send_line "echo '========================================='" 1
            send_line "echo '📍 Commands executed in tmux pane: asses:0.0'" 1
            send_line "echo '🔍 Attach with: tmux attach -t asses'" 1
            send_line "echo '📊 Logs:'" 1
            send_line "echo '   tail -f /tmp/django.log'" 1
            send_line "echo '   tail -f /tmp/celery.log'" 1
            send_line "echo '========================================='" 1

            echo ""
            echo "========================================="
            echo "✅ WORKFLOW FINISHED SENDING COMMANDS"
            echo "========================================="
            echo "📍 tmux target: ${TMUX_TARGET}"
            echo "🔍 SSH into server and run:"
            echo "   tmux attach -t asses"
            echo ""
            echo "📊 Logs:"
            echo "   tail -f /tmp/django.log"
            echo "   tail -f /tmp/celery.log"
            echo "========================================="