name: Deploy Django to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Django via SSH and tmux
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            TMUX_SESSION="asses"
            TMUX_TARGET="${TMUX_SESSION}:0.0"
            DEPLOY_SCRIPT="/tmp/pixii_deploy.sh"

            REPO_URL="git@github.com:HarshEase1/PixxiAssignment.git"
            PROJECT_ROOT="$HOME/PixxiAssignment"
            PROJECT_DIR="$HOME/PixxiAssignment/backend"
            VENV_PATH="$HOME/PixxiAssignment/backend/venv"

            echo "========================================="
            echo "🚀 Preparing tmux deployment"
            echo "========================================="
            echo "TMUX_TARGET=${TMUX_TARGET}"
            echo "REPO_URL=${REPO_URL}"
            echo "PROJECT_ROOT=${PROJECT_ROOT}"
            echo "PROJECT_DIR=${PROJECT_DIR}"
            echo "VENV_PATH=${VENV_PATH}"
            echo "DEPLOY_SCRIPT=${DEPLOY_SCRIPT}"
            echo "========================================="

            if ! command -v tmux >/dev/null 2>&1; then
              apt update
              apt install -y tmux
            fi

            if ! tmux has-session -t "${TMUX_SESSION}" 2>/dev/null; then
              tmux new-session -s "${TMUX_SESSION}" -d
            fi

            tmux select-window -t "${TMUX_SESSION}:0"
            tmux select-pane -t "${TMUX_TARGET}"

            cat > "${DEPLOY_SCRIPT}" <<'DEPLOY_EOF'
            #!/usr/bin/env bash
            set -e
            set -o pipefail

            REPO_URL="git@github.com:HarshEase1/PixxiAssignment.git"
            PROJECT_ROOT="$HOME/PixxiAssignment"
            PROJECT_DIR="$HOME/PixxiAssignment/backend"
            VENV_PATH="$HOME/PixxiAssignment/backend/venv"

            echo "========================================="
            echo "🚀 Django Deployment Started"
            echo "========================================="
            date

            echo "📂 HOME: $HOME"
            echo "📦 REPO_URL: $REPO_URL"
            echo "📂 PROJECT_ROOT: $PROJECT_ROOT"
            echo "📂 PROJECT_DIR: $PROJECT_DIR"
            echo "🐍 VENV_PATH: $VENV_PATH"

            echo "========================================="
            echo "🧰 Step 1: Installing required system packages"
            echo "========================================="

            apt update
            apt install -y git python3 python3-venv python3-pip redis-server nginx lsof

            echo "✅ System packages installed"

            echo "========================================="
            echo "🛑 Step 2: Stopping app services safely"
            echo "========================================="

            echo "Stopping anything using port 8000..."
            if command -v lsof >/dev/null 2>&1; then
              lsof -ti:8000 | xargs -r kill -TERM || true
              sleep 2
              lsof -ti:8000 | xargs -r kill -9 || true
            else
              fuser -k 8000/tcp || true
            fi

            echo "Stopping Celery workers..."
            ps -eo pid,args | awk '/celery -A config worker/ && !/awk/ {print $1}' | xargs -r kill -TERM || true
            sleep 2
            ps -eo pid,args | awk '/celery -A config worker/ && !/awk/ {print $1}' | xargs -r kill -9 || true

            echo "Stopping Celery beat..."
            ps -eo pid,args | awk '/celery -A config beat/ && !/awk/ {print $1}' | xargs -r kill -TERM || true
            sleep 1
            ps -eo pid,args | awk '/celery -A config beat/ && !/awk/ {print $1}' | xargs -r kill -9 || true

            echo "Stopping Gunicorn if running..."
            ps -eo pid,args | awk '/gunicorn/ && !/awk/ {print $1}' | xargs -r kill -TERM || true
            sleep 1
            ps -eo pid,args | awk '/gunicorn/ && !/awk/ {print $1}' | xargs -r kill -9 || true

            echo "✅ App services stopped"

            echo "========================================="
            echo "🔴 Step 3: Starting Redis"
            echo "========================================="

            systemctl enable redis-server || true
            systemctl restart redis-server || true
            redis-cli ping || true

            echo "========================================="
            echo "🌐 Step 4: Starting Nginx"
            echo "========================================="

            systemctl enable nginx || true
            systemctl start nginx || true

            echo "========================================="
            echo "🧹 Step 5: Removing old project folder"
            echo "========================================="

            rm -rf "$PROJECT_ROOT"
            echo "✅ Removed old project folder if it existed"

            echo "========================================="
            echo "📥 Step 6: Cloning latest repository"
            echo "========================================="

            cd "$HOME"
            git clone "$REPO_URL" "$PROJECT_ROOT"

            echo "✅ Repository cloned"

            echo "========================================="
            echo "📂 Step 7: Entering backend directory"
            echo "========================================="

            cd "$PROJECT_DIR"
            pwd
            ls -la

            echo "========================================="
            echo "🐍 Step 8: Creating virtual environment"
            echo "========================================="

            python3 -m venv "$VENV_PATH"
            source "$VENV_PATH/bin/activate"

            python --version
            pip --version

            echo "========================================="
            echo "📦 Step 9: Installing Python dependencies"
            echo "========================================="

            pip install --upgrade pip
            pip install -r requirements.txt

            echo "========================================="
            echo "🗄️ Step 10: Running migrations"
            echo "========================================="

            python manage.py makemigrations
            python manage.py migrate

            echo "========================================="
            echo "📊 Step 11: Collecting static files"
            echo "========================================="

            python manage.py collectstatic --noinput

            echo "========================================="
            echo "🧪 Step 12: Running Django checks"
            echo "========================================="

            python manage.py check

            echo "========================================="
            echo "✅ Step 13: Starting services"
            echo "========================================="

            echo "🔵 Starting Celery worker..."
            nohup "$VENV_PATH/bin/celery" -A config worker --loglevel=info --pool=solo > /tmp/celery.log 2>&1 &

            sleep 2

            echo "🟢 Starting Django server..."
            nohup "$VENV_PATH/bin/python" manage.py runserver 0.0.0.0:8000 > /tmp/django.log 2>&1 &

            sleep 2

            echo "========================================="
            echo "🌐 Step 14: Testing and reloading Nginx"
            echo "========================================="

            nginx -t
            systemctl reload nginx || true

            echo "========================================="
            echo "📍 Step 15: Service status"
            echo "========================================="

            ps aux | grep -E '[r]unserver|[c]elery' || true
            systemctl status redis-server --no-pager || true
            systemctl status nginx --no-pager || true

            echo "========================================="
            echo "✅ Deployment Complete!"
            echo "========================================="
            echo "📊 Logs:"
            echo "   tail -f /tmp/django.log"
            echo "   tail -f /tmp/celery.log"
            echo ""
            echo "🌐 Test API:"
            echo "   curl http://127.0.0.1:8000/api/health/"
            echo "========================================="
            DEPLOY_EOF

            chmod +x "${DEPLOY_SCRIPT}"

            echo "========================================="
            echo "📤 Sending deploy script execution to tmux"
            echo "Target: ${TMUX_TARGET}"
            echo "========================================="

            tmux send-keys -t "${TMUX_TARGET}" C-c
            sleep 1
            tmux send-keys -t "${TMUX_TARGET}" "clear" Enter
            sleep 1
            tmux send-keys -t "${TMUX_TARGET}" "bash -x ${DEPLOY_SCRIPT}" Enter

            echo "========================================="
            echo "✅ Deploy command sent to tmux"
            echo "========================================="
            echo "Attach to server and watch:"
            echo "tmux attach -t ${TMUX_SESSION}"
            echo ""
            echo "Logs:"
            echo "tail -f /tmp/django.log"
            echo "tail -f /tmp/celery.log"
            echo "========================================="